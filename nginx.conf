server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejor rendimiento
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Headers de seguridad compartidos para todas las respuestas
    include /etc/nginx/conf.d/security-headers.inc;

    # Cache para assets estáticos - caching moderado para evitar sensación de app pegada
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    # Cache para el manifiesto
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    location = /registerSW.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri =404;
    }

    # No cache para index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Manejo de rutas SPA - redirigir todo a index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Headers para HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Health check endpoint para Dockploy
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        include /etc/nginx/conf.d/security-headers.inc;
    }

    # Ocultar versión de nginx
    server_tokens off;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
