services:
  herculito-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PUSH_API_ORIGIN: ${VITE_PUSH_API_ORIGIN}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_CLERK_JWT_TEMPLATE: ${VITE_CLERK_JWT_TEMPLATE}


    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - proxy
    # Dockploy injects Traefik labels automatically for this service.

networks:
  proxy:
    external: true
